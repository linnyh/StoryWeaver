name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.109.0 sqlalchemy==2.0.25 aiosqlite==0.19.0 \
            'pydantic>=2.7.0' pydantic-settings==2.1.0 aiohttp==3.9.1 \
            chromadb==0.4.22 uvicorn==0.27.0 httpx==0.28.1

      - name: Run Unit And Integration Tests
        run: |
          python -m unittest -q \
            test_scene_image_service.py \
            test_errors_unittest.py \
            test_scene_usecases_unittest.py \
            test_scene_postprocess_unittest.py \
            test_chapter_usecases_unittest.py \
            test_novel_usecases_unittest.py \
            test_api_integration_unittest.py
